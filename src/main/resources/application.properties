spring.application.name=flashcards-backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flashcards}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flashcards}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:flashcards}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-32}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:604800}
app.cookie.secure=${COOKIE_SECURE:false}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8088}
